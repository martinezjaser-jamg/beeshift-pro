<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BeeShift</title>
<style>
body{font-family:Arial;background:#fff7d6;margin:0}
header{background:#111;color:#fff;padding:15px;text-align:center}
button{padding:12px;margin:5px;border:none;border-radius:10px;font-weight:bold}
.hidden{display:none}
.card{background:white;margin:10px;padding:15px;border-radius:15px}
</style>
</head>
<body>

<header>🐝 BeeShift</header>

<div class="card" id="home">
<h2>Select Worker</h2>
<button onclick="login('Jaser','1234')">Jaser</button>
<button onclick="login('Maria','2222')">Maria</button>
<button onclick="login('Carlos','3333')">Carlos</button>
</div>

<div class="card hidden" id="app">
<h2 id="user"></h2>
<button onclick="clock('IN')">Clock In</button>
<button onclick="clock('OUT')">Clock Out</button>
<p id="status">Status: Out</p>
</div>

<script>
let currentUser=null;

function login(name,pin){
let input=prompt("Enter PIN");
if(input===pin){
currentUser=name;
document.getElementById("home").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("user").innerText=name;
}else{
alert("Wrong PIN");
}
}

function clock(type){
document.getElementById("status").innerText="Status: "+type;
}
</script>

</body>
</html>
