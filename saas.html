<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BeeShift SaaS</title>
<style>
body{margin:0;background:#1a1400;color:#fff8e0;font-family:Arial}
main{max-width:900px;margin:auto;padding:16px}.brand{font-size:28px;font-weight:900;color:#f5c400;text-align:center;margin:20px}.card{background:#2c2400;padding:15px;border-radius:15px;margin:10px 0}input,textarea{width:100%;box-sizing:border-box;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #444;background:#111;color:#fff}button{padding:10px;border:none;border-radius:8px;background:#f5c400;color:#1a1400;font-weight:bold;margin:5px}.worker{padding:10px;background:#222;margin:5px;border-radius:10px;text-align:center}.hidden{display:none}.error{color:#ff5252;font-size:13px;white-space:pre-wrap}.ok{color:#00c864;font-size:13px}
</style>
</head>
<body>
<main id="setup">
<div class="brand">🐝 BeeShift Setup</div>
<div class="card">
<p>Paste your Firebase config. This now accepts JSON, <b>firebaseConfig = {...}</b>, or <b>const firebaseConfig = {...};</b></p>
<textarea id="cfg" rows="10" placeholder="Paste Firebase config here"></textarea>
<button onclick="saveConfig()">Save</button>
<button onclick="clearConfig()">Clear Saved Config</button>
<div id="setupMsg"></div>
</div>
</main>
<main id="login" class="hidden">
<div class="brand">Login</div>
<div class="card">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="company" placeholder="Company name">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="clearConfig()">Reset Firebase Config</button>
<div id="authMsg"></div>
</div>
</main>
<main id="admin" class="hidden">
<div class="brand">🐝 Admin Panel</div>
<div class="card">
<input id="workerName" placeholder="Worker name">
<input id="workerPin" placeholder="PIN">
<button onclick="addWorker()">Add Worker</button>
</div>
<div id="workers"></div>
<button onclick="logout()">Logout</button>
</main>
<script type="module">
let app,auth,db,firebase;
function screen(id){["setup","login","admin"].forEach(x=>document.getElementById(x).classList.add("hidden"));document.getElementById(id).classList.remove("hidden")}
function msg(id,text,type="error"){document.getElementById(id).className=type;document.getElementById(id).textContent=text}
function parseFirebaseConfig(raw){
  let t=(raw||"").trim();
  t=t.replace(/<script[\s\S]*?>/gi,"").replace(/<\/script>/gi,"").trim();
  t=t.replace(/^const\s+firebaseConfig\s*=\s*/m,"").replace(/^let\s+firebaseConfig\s*=\s*/m,"").replace(/^var\s+firebaseConfig\s*=\s*/m,"").replace(/^firebaseConfig\s*=\s*/m,"").trim();
  t=t.replace(/;\s*$/," ").trim();
  const first=t.indexOf("{");
  const last=t.lastIndexOf("}");
  if(first===-1||last===-1||last<=first) throw new Error("Firebase config must start with { and end with }.");
  t=t.slice(first,last+1);
  try { return JSON.parse(t); } catch(e) {}
  return Function("return ("+t+")")();
}
window.saveConfig=()=>{try{const cfg=parseFirebaseConfig(document.getElementById("cfg").value);localStorage.setItem("cfg",JSON.stringify(cfg));msg("setupMsg","Saved. Loading login screen...","ok");setTimeout(()=>location.reload(),500)}catch(e){msg("setupMsg","Config error: "+e.message)}};
window.clearConfig=()=>{localStorage.removeItem("cfg");location.reload()};
async function init(){try{let saved=localStorage.getItem("cfg");if(!saved){screen("setup");return}let cfg=parseFirebaseConfig(saved);let A=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");let AU=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");let FS=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");app=A.initializeApp(cfg);auth=AU.getAuth(app);db=FS.getFirestore(app);firebase={...AU,...FS};firebase.onAuthStateChanged(auth,user=>{if(user){loadWorkers();screen("admin")}else{screen("login")}})}catch(e){localStorage.removeItem("cfg");screen("setup");msg("setupMsg","Firebase error: "+e.message)}}
window.signup=async()=>{try{await firebase.createUserWithEmailAndPassword(auth,document.getElementById("email").value,document.getElementById("pass").value)}catch(e){msg("authMsg",e.message)}};
window.login=async()=>{try{await firebase.signInWithEmailAndPassword(auth,document.getElementById("email").value,document.getElementById("pass").value)}catch(e){msg("authMsg",e.message)}};
window.logout=()=>firebase.signOut(auth);
function loadWorkers(){firebase.onSnapshot(firebase.collection(db,"workers"),snap=>{let html="";snap.forEach(doc=>{let w=doc.data();html+=`<div class="worker">${w.name||"No name"} | PIN: ${w.pin||""}</div>`});document.getElementById("workers").innerHTML=html||'<div class="worker">No workers yet</div>'})}
window.addWorker=async()=>{try{let name=document.getElementById("workerName").value.trim();let pin=document.getElementById("workerPin").value.trim();if(!name||!pin){alert("Add name and PIN");return}await firebase.addDoc(firebase.collection(db,"workers"),{name,pin,createdAt:new Date().toISOString()});document.getElementById("workerName").value="";document.getElementById("workerPin").value=""}catch(e){alert(e.message)}};
init();
</script>
</body>
</html>
