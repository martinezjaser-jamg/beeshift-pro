<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>BeeShift Face Match Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
      padding:18px;
    }
    .box{
      background:#222;
      padding:18px;
      border-radius:18px;
      margin:14px auto;
      max-width:520px;
    }
    img{
      max-width:260px;
      border-radius:14px;
      margin:10px auto;
      display:block;
    }
    button{
      padding:14px 22px;
      border-radius:12px;
      border:0;
      background:#f5c400;
      font-weight:900;
      font-size:16px;
      margin:10px;
    }
    #result{
      font-size:30px;
      font-weight:900;
      margin-top:20px;
    }
    .muted{color:#aaa}
  </style>
</head>

<body>

<h1>🧪 BeeShift Face Match Test</h1>
<p class="muted">Profile photo vs clock-in selfie</p>

<div class="box">
  <h2>Upload Profile Photo</h2>
  <input type="file" id="profileInput" accept="image/*">
  <img id="profilePreview">
</div>

<div class="box">
  <h2>Upload Selfie</h2>
  <input type="file" id="selfieInput" accept="image/*" capture="user">
  <img id="selfiePreview">
</div>

<button onclick="runMatch()">Compare Faces</button>

<div id="result"></div>
<p id="details" class="muted"></p>

<script>
let profileFile = null;
let selfieFile = null;
let modelsLoaded = false;

document.getElementById("profileInput").onchange = e => {
  profileFile = e.target.files[0];
  if(profileFile){
    document.getElementById("profilePreview").src = URL.createObjectURL(profileFile);
  }
};

document.getElementById("selfieInput").onchange = e => {
  selfieFile = e.target.files[0];
  if(selfieFile){
    document.getElementById("selfiePreview").src = URL.createObjectURL(selfieFile);
  }
};

async function loadModels(){
  if(modelsLoaded) return;

  document.getElementById("result").textContent = "Loading models...";
  document.getElementById("details").textContent = "First time can take 5–15 seconds.";

  const MODEL_URL = "https://justadudewhohacks.github.io/face-api.js/models";

  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
  await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

  modelsLoaded = true;
}

async function fileToImage(file){
  return await faceapi.bufferToImage(file);
}

async function getFaceDescriptor(file){
  const img = await fileToImage(file);

  const detection = await faceapi
    .detectSingleFace(
      img,
      new faceapi.TinyFaceDetectorOptions({
        inputSize: 320,
        scoreThreshold: 0.4
      })
    )
    .withFaceLandmarks()
    .withFaceDescriptor();

  return detection;
}

async function runMatch(){
  if(!profileFile || !selfieFile){
    alert("Upload both images first.");
    return;
  }

  try{
    await loadModels();

    document.getElementById("result").textContent = "Processing...";
    document.getElementById("details").textContent = "";

    const profileDetection = await getFaceDescriptor(profileFile);
    const selfieDetection = await getFaceDescriptor(selfieFile);

    if(!profileDetection){
      document.getElementById("result").textContent = "Profile face not detected ❌";
      return;
    }

    if(!selfieDetection){
      document.getElementById("result").textContent = "Selfie face not detected ❌";
      return;
    }

    const distance = faceapi.euclideanDistance(
      profileDetection.descriptor,
      selfieDetection.descriptor
    );

    let status = "";
    let emoji = "";

    if(distance < 0.45){
      status = "MATCH";
      emoji = "✅";
    }else if(distance < 0.60){
      status = "REVIEW";
      emoji = "⚠️";
    }else{
      status = "NO MATCH";
      emoji = "❌";
    }

    document.getElementById("result").textContent =
      `${status} ${emoji}`;

    document.getElementById("details").textContent =
      `Face distance score: ${distance.toFixed(3)} | Lower score = better match`;

  }catch(err){
    document.getElementById("result").textContent = "Error ❌";
    document.getElementById("details").textContent = err.message;
    console.error(err);
  }
}
</script>

</body>
</html>
